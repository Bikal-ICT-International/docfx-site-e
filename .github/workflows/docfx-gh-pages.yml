name: Build and Deploy DocFX to gh-pages

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Debounce markdown updates before deploy
        if: github.event_name == 'push'
        run: sleep 120

      - name: Build site and generate PDFs
        env:
          BROWSER_PDF_EXE: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: pwsh ./tools/generate-pdfs-all.ps1

      - name: Deploy _site to gh-pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true

