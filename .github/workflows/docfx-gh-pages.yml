name: Build and Deploy DocFX to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "Products/**"
      - "images/**"
      - "Products/toc.yml"
      - "toc.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      md_changed: ${{ steps.md-changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            docfx.json
            toc.yml
            toc.json
            index.md
            index.json
            manifest.json
            Products
            images
            mytemplate
            xtheme
            tools

      - name: Restore PDF version state cache
        id: cache-pdf-state
        uses: actions/cache@v5
        with:
          path: |
            tools/pdf-version-state.json
            tools/pdf-version-report.json
          key: pdf-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            pdf-state-${{ runner.os }}-${{ github.ref_name }}-
            pdf-state-${{ runner.os }}-
            pdf-state-

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Detect Markdown changes
        id: md-changes
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            range="HEAD~1..HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          echo "Checking diff range: $range"
          if git diff --name-only "$range" | grep -E '(\.md$|(^|/)toc\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check latest pip version
        id: pip-latest
        if: steps.md-changes.outputs.changed == 'true'
        run: |
          python - <<'PY'
          import json, urllib.request
          def to_tuple(v):
            return tuple(int(x) for x in v.split('.') if x.isdigit())
          current = __import__('pip').__version__
          with urllib.request.urlopen("https://pypi.org/pypi/pip/json") as f:
            latest = json.load(f)["info"]["version"]
          need = to_tuple(latest) > to_tuple(current)
          print(f"current={current}")
          print(f"latest={latest}")
          print(f"update_needed={str(need).lower()}")
          with open(r"$GITHUB_OUTPUT", "a") as out:
            out.write(f"latest_version={latest}\n")
            out.write(f"update_needed={str(need).lower()}\n")
          PY

      - name: Cache pip downloads (per pip version)
        id: pip-cache
        if: steps.md-changes.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ steps.pip-latest.outputs.latest_version }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Upgrade pip (only if a newer version exists)
        if: |
          steps.md-changes.outputs.changed == 'true' &&
          steps.pip-latest.outputs.update_needed == 'true' &&
          steps.pip-cache.outputs.cache-hit != 'true'
        run: python -m pip install --upgrade pip

      - name: Install Playwright
        if: steps.md-changes.outputs.changed == 'true'
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Install DocFX
        if: steps.md-changes.outputs.changed == 'true'
        run: dotnet tool install -g docfx

      - name: Build site and generate PDFs
        env:
          USE_PLAYWRIGHT: "1"
        if: steps.md-changes.outputs.changed == 'true'
        run: pwsh ./tools/generate-pdfs-all.ps1

      # Note:
      # The built-in upload-pages-artifact action still uses Node 20 and triggers deprecation warnings,
      # so we make the pages artifact ourselves and use upload-artifact@v6 which supports Node 24.
      - name: Archive Pages artifact
        if: steps.md-changes.outputs.changed == 'true'
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "_site" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Pages artifact
        if: steps.md-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    if: needs.build.outputs.md_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


