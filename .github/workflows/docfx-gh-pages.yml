name: Build and Deploy DocFX to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "Products/**"
      - "images/**"
      - "Products/toc.yml"
      - "toc.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore PDF version state cache
        id: cache-pdf-state
        uses: actions/cache@v4
        with:
          path: |
            tools/pdf-version-state.json
            tools/pdf-version-report.json
          key: pdf-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            pdf-state-${{ runner.os }}-${{ github.ref_name }}-
            pdf-state-${{ runner.os }}-
            pdf-state-

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert DOCX uploads to Markdown
        run: pwsh ./tools/convert-docx-to-md.ps1

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build site and generate PDFs
        env:
          USE_PLAYWRIGHT: "1"
        run: pwsh ./tools/generate-pdfs-all.ps1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
